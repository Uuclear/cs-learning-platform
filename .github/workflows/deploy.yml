name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: platform/package-lock.json

      - name: Install dependencies
        run: cd platform && npm ci

      - name: Prepare static export
        run: |
          # Replace API route with static stub (GitHub Pages doesn't support API routes)
          mv platform/app/api/search/route.ts platform/app/api/search/route.ts.bak
          cat > platform/app/api/search/route.ts << 'EOF'
          import { NextResponse } from "next/server";
          export const dynamic = "force-static";
          export async function GET() {
            return NextResponse.json({ results: [] });
          }
          EOF

      - name: Build static site
        env:
          NEXT_PUBLIC_STATIC_EXPORT: true
        run: |
          cd platform
          node scripts/build-search-index.js
          npx next build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: platform/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
